# docker-compose.prod.yml  –  Production (portal.with-thanks.co.uk)
# Usage (on the Hetzner server via Coolify, or manually):
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f web
#
# Differences from docker-compose.yml (dev):
#   - web uses entrypoint.sh (Gunicorn) instead of Django dev server
#   - Builds the final runtime image (not the build stage)
#   - No source-code volume mounts — code is baked into the image
#   - All 5 services have restart: unless-stopped
#   - Healthcheck on web probes /health/ (DB + Redis deep check)
#   - DB password driven by POSTGRES_PASSWORD env var
#   - DJANGO_ENV=production, DJANGO_DEBUG unset (defaults to False)
#   - Reads secrets from .env.prod (never commit this file)

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: withthanks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: withthanks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U withthanks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (Celery broker) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Django / Gunicorn ────────────────────────────────────────────────────
  web:
    build:
      context: .
      # No target — uses the final slim runtime stage from the Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
      MEDIA_ROOT: /app/media
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Celery worker — video + orchestration queues ─────────────────────────
  worker:
    build:
      context: .
    restart: unless-stopped
    command: >
      celery -A withthanks worker
        --loglevel=info
        --concurrency=2
        --queues=video,default
        --hostname=worker-video@%h
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
      MEDIA_ROOT: /app/media
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker — maintenance queue ────────────────────────────────────
  worker-maintenance:
    build:
      context: .
    restart: unless-stopped
    command: >
      celery -A withthanks worker
        --loglevel=info
        --concurrency=1
        --queues=maintenance
        --hostname=worker-maintenance@%h
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (periodic task scheduler) ────────────────────────────────
  beat:
    build:
      context: .
    restart: unless-stopped
    command: celery -A withthanks beat --loglevel=info
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
