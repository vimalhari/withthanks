target-version = "py312"
line-length = 100
src = ["."]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TC",  # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long — ruff format handles it
    "B008",   # do not perform function calls in default arguments (Django ORM common pattern)
    "RUF012", # mutable class vars — common in Django models
]

[lint.isort]
known-first-party = ["charity", "withthanks"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
