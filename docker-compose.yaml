# docker-compose.yaml  –  Coolify / production deployment
# This file is named .yaml (not .yml) so Coolify finds it automatically.
# It is the production counterpart of docker-compose.prod.yml.
#
# Key differences from docker-compose.yml (local dev):
#   - Uses the final slim runtime stage (no `target: build`)
#   - No source-code volume mounts (code + staticfiles are baked into the image)
#   - Runs Gunicorn via entrypoint.sh (which also applies migrations + collectstatic)
#   - Env vars injected by Coolify via .env

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: withthanks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: withthanks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U withthanks" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (Celery broker) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Django / Gunicorn ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      # No target — builds the full runtime stage; staticfiles baked in
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
      MEDIA_ROOT: /app/media
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Celery worker — video + orchestration queues ─────────────────────────
  # Handles process_donation_row (CPU/FFmpeg), batch_process_csv, and
  # on_batch_complete callbacks.  Scaled up independently of maintenance work.
  worker:
    build:
      context: .
    restart: unless-stopped
    command: >
      celery -A withthanks worker
        --loglevel=info
        --concurrency=2
        --queues=video,default
        --hostname=worker-video@%h
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
      MEDIA_ROOT: /app/media
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker — maintenance queue ────────────────────────────────────
  # Isolated from video work so beat tasks (stats refresh, cleanup, etc.)
  # are never delayed by slow FFmpeg jobs.
  worker-maintenance:
    build:
      context: .
    restart: unless-stopped
    command: >
      celery -A withthanks worker
        --loglevel=info
        --concurrency=1
        --queues=maintenance
        --hostname=worker-maintenance@%h
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (periodic task scheduler) ────────────────────────────────
  beat:
    build:
      context: .
    restart: unless-stopped
    command: celery -A withthanks beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://withthanks:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/withthanks
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
