<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Upload CSV | Voiceover & Video Generator</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: #fff;
        padding: 40px 50px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        width: 420px;
        text-align: center;
      }

      h1 {
        color: #333;
        font-size: 1.6rem;
        margin-bottom: 10px;
      }

      p.message {
        background: #f0f7ff;
        color: #0a66c2;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      p.error {
        background: #ffecec;
        color: #b00020;
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
      }

      form {
        margin-top: 15px;
        text-align: left;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #333;
      }

      input[type="file"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 20px;
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 10px 0;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #0056b3;
      }

      ul.errors {
        list-style: none;
        padding: 0;
        margin-top: 15px;
        text-align: left;
      }

      ul.errors li {
        color: #b00020;
        font-size: 0.9rem;
        margin-bottom: 5px;
        background: #fff5f5;
        padding: 6px 8px;
        border-radius: 6px;
      }

      footer {
        margin-top: 25px;
        font-size: 0.8rem;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Upload CSV for Voiceovers & Video</h1>

      {% if message %}
      <p class="message">{{ message }}</p>
      {% endif %}

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Upload & Process</button>
      </form>

      {% if errors %}
      <ul class="errors">
        {% for err in errors %}
        <li>{{ err }}</li>
        {% endfor %}
      </ul>
      {% endif %}

      <footer>
        <p>Powered by Django · Automated Voiceover & Video Generator</p>
      </footer>
    </div>
  </body>
</html>
