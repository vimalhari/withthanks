{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WithThanks</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  </head>
  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-300 font-sans">

      <div class="grid gap-3">
        <a class="inline-block py-3 px-4 rounded-lg font-semibold text-white bg-brand hover:bg-brand/90 transition" href="/upload-csv/">Open CSV Upload</a>
        <a class="inline-block py-3 px-4 rounded-lg font-semibold text-white bg-gray-700 hover:bg-gray-800 transition" href="/admin/">Open Admin</a>

    </main>
