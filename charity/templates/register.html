{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | WithThanks</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="h-full flex items-center justify-center p-5 font-[Inter] bg-gray-50
             bg-[radial-gradient(circle_at_top_right,rgba(99,102,241,0.05),transparent_40%),radial-gradient(circle_at_bottom_left,rgba(79,70,229,0.08),transparent_40%)]">

    <div class="w-full max-w-[440px] bg-white rounded-2xl shadow-lg border border-gray-200/80
                relative overflow-hidden">
        <!-- Top accent bar -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-brand to-indigo-400"></div>

        <div class="px-10 pt-12 pb-10">
            <!-- Logo -->
            <div class="text-center mb-8">
                <img src="{% static 'charity/img/with_thanks_logo_header.png' %}"
                     alt="WithThanks" class="h-10 w-auto inline-block">
            </div>

            <h1 class="text-2xl font-extrabold text-gray-900 text-center tracking-tight mb-2">Create Account</h1>
            <p class="text-sm text-gray-500 text-center font-medium mb-8">Register for a new WithThanks account</p>

            {% if error %}
            <div class="flex items-center gap-2.5 rounded-xl px-4 py-3 text-[13px] font-semibold mb-6 bg-red-50 text-red-600">
                <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Register Form -->
            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}

                <div class="mb-5">
                    <label class="form-label">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input type="text" name="username" required
                               class="form-input pl-11" placeholder="Choose a username">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input type="password" name="password" required
                               class="form-input pl-11" placeholder="Create a password">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="form-label">Confirm Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input type="password" name="password_confirm" required
                               class="form-input pl-11" placeholder="Confirm your password">
                    </div>
                </div>

                <button type="submit"
                        class="w-full flex items-center justify-center gap-2 rounded-xl bg-brand text-white
                               py-3.5 text-[15px] font-bold cursor-pointer
                               hover:bg-brand-hover hover:-translate-y-px hover:shadow-lg
                               transition-all duration-200">
                    Create Account
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Already have an account?
                <a href="{% url 'charity_login' %}" class="text-brand font-semibold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script>document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });</script>
</body>
</html>
