{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Voiceovers</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  </head>
  <body class="min-h-screen bg-gray-50 p-8 font-sans">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-2xl font-extrabold text-gray-900 mb-6">Generated Voiceovers</h1>

      {% if files %}
      <ul class="space-y-4">
        {% for file in files %}
        <li class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center gap-4">
          <span class="font-semibold text-gray-700 text-sm truncate flex-1">{{ file }}</span>

          <audio controls class="h-8 flex-shrink-0">
            <source src="{{ MEDIA_URL }}voiceovers/{{ file }}" type="audio/mpeg" />
            Your browser does not support the audio element.
          </audio>

          <div class="flex gap-2 flex-shrink-0">
            <a href="{{ MEDIA_URL }}voiceovers/{{ file }}" download class="inline-block py-1.5 px-3 rounded-lg text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">Download</a>
            <a href="#" class="inline-block py-1.5 px-3 rounded-lg text-xs font-semibold bg-brand text-white hover:bg-brand/90 transition opacity-50 cursor-not-allowed" title="Coming soon">Stitch to Video</a>
          </div>
        </li>
        {% endfor %}
      </ul>
      {% else %}
      <p class="text-gray-400 py-12 text-center">No voiceovers found.</p>
      {% endif %}
    </div>
  </body>
</html>
