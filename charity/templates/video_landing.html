<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message for {{ job.display_donor_name }}</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .player-container { max-width: 800px; width: 90%; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; position: relative; }
        .player-stage { position: relative; background: #000; }
        .player-frame { position: relative; padding-top: 56.25%; z-index: 1; }
        .player-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); pointer-events: none; opacity: 1; transition: opacity 0.3s; }
        .overlay.hidden { opacity: 0; }
        .play-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.1); }
        .play-icon { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid #333; margin-left: 5px; }
        .branding { padding: 20px; background: #fff; text-align: center; position: relative; z-index: 1; }
        .branding h1 { margin: 0 0 10px; color: #333; font-size: 24px; }
        .branding p { color: #666; margin: 0; }
        /* Post-video CTA overlay */
        .cta-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 20; }
        .cta-overlay.visible { opacity: 1; pointer-events: auto; }
        .cta-card { background: #fff; border-radius: 12px; padding: 32px 40px; text-align: center; max-width: 360px; width: 85%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .cta-card h2 { margin: 0 0 8px; color: #222; font-size: 20px; font-weight: 700; }
        .cta-card p { color: #555; margin: 0 0 24px; font-size: 15px; }
        .cta-btn { display: inline-block; background: #2563eb; color: #fff; font-size: 16px; font-weight: 600; padding: 12px 28px; border-radius: 8px; text-decoration: none; cursor: pointer; border: none; transition: background 0.2s, transform 0.15s; }
        .cta-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-stage">
            <div class="player-frame">
                <iframe
                    id="streamPlayer"
                    src="{{ stream_embed_url }}"
                    allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
                    allowfullscreen="true"
                    title="A special message for {{ job.display_donor_name }}"
                ></iframe>
            </div>

            {% if cta_url %}
            <div class="cta-overlay" id="ctaOverlay" aria-hidden="true">
                <div class="cta-card">
                    <h2>Thank you, {{ job.display_donor_name }}!</h2>
                    <p>Your generosity makes a real difference to {{ job.charity.charity_name }}.</p>
                    <button class="cta-btn" id="ctaBtn">{{ cta_label }}</button>
                </div>
            </div>
            {% endif %}
        </div>

        <div class="branding">
            <h1>Thank You, {{ job.display_donor_name }}!</h1>
            <p>A message from {{ job.charity.charity_name }}</p>
        </div>
    </div>
    <script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
    <script>
        const streamFrame = document.getElementById('streamPlayer');
        const trackingId = "{{ tracking_id }}";
        const eventUrl = "{% url 'track_video_event' %}";
        
        // Helper to send events
        function sendEvent(eventType, duration) {
            if (!trackingId) return;
            
            const payload = {
                tracking_id: trackingId,
                event: eventType,
                duration: duration ?? 0
            };

            fetch(eventUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Tracking Error:", err));
        }

        {% if cta_url %}
        const ctaUrl = "{{ cta_url|escapejs }}";
        const ctaOverlay = document.getElementById('ctaOverlay');
        const ctaBtn = document.getElementById('ctaBtn');

        function showCta() {
            if (ctaUrl && ctaOverlay) {
                ctaOverlay.classList.add('visible');
                ctaOverlay.setAttribute('aria-hidden', 'false');
            }
        }

        if (ctaBtn) {
            ctaBtn.addEventListener('click', () => {
                window.open(ctaUrl, '_blank', 'noopener,noreferrer');
            });
        }
        {% else %}
        function showCta() {}
        {% endif %}

        function bindPlayerEvents(player) {
            let hasPlayed = false;
            let lastReportTime = 0;
            let hasCompleted = false;

            function currentPosition() {
                return Number(player.currentTime || 0);
            }

            function totalDuration() {
                return Number(player.duration || currentPosition());
            }

            function handlePlaybackComplete() {
                if (!hasCompleted) {
                    hasCompleted = true;
                    sendEvent('complete', totalDuration());
                }
                showCta();
            }

            player.addEventListener('play', () => {
                if (!hasPlayed) {
                    hasPlayed = true;
                    sendEvent('play', currentPosition());
                }
            });

            player.addEventListener('pause', () => {
                if (!player.ended) {
                    sendEvent('pause', currentPosition());
                }
            });

            player.addEventListener('timeupdate', () => {
                const now = Date.now();
                if (now - lastReportTime > 5000) {
                    lastReportTime = now;
                    sendEvent('progress', currentPosition());
                }

                if (
                    !hasCompleted &&
                    Number.isFinite(Number(player.duration)) &&
                    Number(player.duration) > 0 &&
                    currentPosition() >= Math.max(Number(player.duration) - 0.35, 0)
                ) {
                    handlePlaybackComplete();
                }
            });

            player.addEventListener('ended', handlePlaybackComplete);
        }

        if (streamFrame && typeof Stream === 'function') {
            bindPlayerEvents(Stream(streamFrame));
        }
    </script>

</body>
</html>
