{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WithThanks</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Icons & Typography -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Enterprise SaaS CSS Settings Context -->
    <link rel="stylesheet" href="{% static 'charity/global_saas.css' %}">
    
    <style>
        body {
            background-color: var(--light-bg, #f8fafc);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.08), transparent 40%);
        }
        
        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(226, 232, 240, 0.8);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary, #4f46e5), #818cf8);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            display: inline-block;
        }

        .heading {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-headings, #0f172a);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .subheading {
            font-size: 14px;
            color: var(--text-muted, #64748b);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .form-control {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            background: #fafafa;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: var(--primary, #4f46e5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: #94a3b8;
        }

        .saas-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-headings, #334155);
            margin-bottom: 8px;
            display: block;
        }

        .btn-login {
            background: var(--primary, #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            margin-top: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
            color: white;
        }

        .alert-custom {
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            border: none;
        }
        
        .alert-success-custom {
            background: #ecfdf5;
            color: #059669;
        }
        
        .alert-error-custom {
            background: #fef2f2;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <img src="{% static 'charity/img/with_thanks_logo_header.png' %}" alt="WithThanks Logo">
        </div>
        
        <h1 class="heading">Welcome Back</h1>
        <p class="subheading">Enter your credentials to access your portal</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-custom {% if message.tags == 'success' %}alert-success-custom{% else %}alert-error-custom{% endif %}">
                    {% if message.tags == 'success' %}
                        <i class="bi bi-check-circle-fill" style="font-size: 16px;"></i>
                    {% else %}
                        <i class="bi bi-exclamation-triangle-fill" style="font-size: 16px;"></i>
                    {% endif %}
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% if error %}
            <div class="alert-custom alert-error-custom">
                <i class="bi bi-exclamation-triangle-fill" style="font-size: 16px;"></i>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'charity_login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label class="saas-label">Username</label>
                <div style="position: relative;">
                    <i class="bi bi-person text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="text" name="username" required class="form-control" placeholder="Enter your username" style="padding-left: 42px;">
                </div>
            </div>
            
            <div style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="saas-label" style="margin-bottom: 0;">Password</label>
                </div>
                <div style="position: relative;">
                    <i class="bi bi-lock text-muted" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%);"></i>
                    <input type="password" name="password" required class="form-control" placeholder="Enter your password" style="padding-left: 42px;">
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Sign In <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>
</body>
</html>
