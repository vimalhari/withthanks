name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ------------------------------------------------------------------ #
  # Lint & type-check                                                    #
  # ------------------------------------------------------------------ #
  lint:
    name: Ruff + Pyright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.7"

      - name: Set up Python 3.14.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install all dependencies (including dev)
        run: uv sync --frozen

      - name: Ruff – lint
        run: uv run ruff check .

      - name: Ruff – format check
        run: uv run ruff format --check .

      - name: Pyright – type check
        run: uv run pyright

      - name: Production guards
        run: make verify-prod-config

  # ------------------------------------------------------------------ #
  # Tests                                                                #
  # ------------------------------------------------------------------ #
  test:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.7"

      - name: Set up Python 3.14.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-used-in-production"
          DJANGO_DEBUG: "true"
          DJANGO_SETTINGS_MODULE: "withthanks.settings_test"
        run: uv run python manage.py test --verbosity=2
